<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    #pet-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #pet-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="pet-container">
    <img id="pet-img" src="../pet-assets/01_idle_breathing.png" alt="pet"></img>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
